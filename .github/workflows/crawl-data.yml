name: Crawl Pet-Friendly Venues Data

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run crawler to update data
        run: npm run crawl
        timeout-minutes: 15

      - name: Check if data was updated
        run: |
          if [ -f "data/taichung.json" ]; then
            echo "taichung.json found and updated"
          else
            echo "Warning: taichung.json not found"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          export TZ='Asia/Taipei'
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🐾 Auto update pet-friendly venues data - $(date +'%Y-%m-%d %H:%M') UTC+8"
            git push
          fi
