name: Crawl Pet-Friendly Venues Data

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run crawler to update data
        run: npm run crawl
        timeout-minutes: 15

      - name: Check if data was updated
        run: |
          for city in taipei taichung; do
            if [ -f "data/raw/${city}.json" ]; then
              echo "${city}.json found and updated"
            else
              echo "Warning: data/raw/${city}.json not found"
              exit 1
            fi
          done

      - name: Commit and push changes
        run: |
          export TZ='Asia/Taipei'
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🐾 Auto update pet-friendly venues data - $(date +'%Y-%m-%d %H:%M') UTC+8"
            git push
          fi
